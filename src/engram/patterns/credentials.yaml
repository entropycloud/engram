patterns:
  # AWS
  - id: "CRED-001"
    pattern: "AKIA[0-9A-Z]{16}"
    severity: critical
    category: credential
    description: "AWS access key ID"
  - id: "CRED-002"
    pattern: "ASIA[0-9A-Z]{16}"
    severity: critical
    category: credential
    description: "AWS temporary access key ID"
  - id: "CRED-003"
    pattern: "aws_secret_access_key\\s*[=:]\\s*\\S+"
    severity: critical
    category: credential
    description: "AWS secret access key assignment"
  - id: "CRED-004"
    pattern: "aws_session_token\\s*[=:]\\s*\\S+"
    severity: critical
    category: credential
    description: "AWS session token assignment"

  # Private keys
  - id: "CRED-005"
    pattern: "-----BEGIN (?:RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----"
    severity: critical
    category: credential
    description: "Private key header"
  - id: "CRED-006"
    pattern: "-----BEGIN PGP PRIVATE KEY BLOCK-----"
    severity: critical
    category: credential
    description: "PGP private key header"

  # Generic API keys and tokens
  - id: "CRED-007"
    pattern: "api[_-]?key\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: critical
    category: credential
    description: "API key assignment"
  - id: "CRED-008"
    pattern: "api[_-]?secret\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: critical
    category: credential
    description: "API secret assignment"
  - id: "CRED-009"
    pattern: "access[_-]?token\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: critical
    category: credential
    description: "Access token assignment"
  - id: "CRED-010"
    pattern: "auth[_-]?token\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: critical
    category: credential
    description: "Auth token assignment"
  - id: "CRED-011"
    pattern: "bearer\\s+[A-Za-z0-9_\\-\\.]{20,}"
    severity: critical
    category: credential
    description: "Bearer token in text"

  # Password patterns
  - id: "CRED-012"
    pattern: "password\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
    severity: critical
    category: credential
    description: "Password assignment"
  - id: "CRED-013"
    pattern: "passwd\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
    severity: critical
    category: credential
    description: "Passwd assignment"
  - id: "CRED-014"
    pattern: "secret\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{16,}['\"]"
    severity: critical
    category: credential
    description: "Secret value assignment"

  # Cloud provider tokens
  - id: "CRED-015"
    pattern: "ghp_[A-Za-z0-9]{36}"
    severity: critical
    category: credential
    description: "GitHub personal access token"
  - id: "CRED-016"
    pattern: "gho_[A-Za-z0-9]{36}"
    severity: critical
    category: credential
    description: "GitHub OAuth access token"
  - id: "CRED-017"
    pattern: "ghu_[A-Za-z0-9]{36}"
    severity: critical
    category: credential
    description: "GitHub user-to-server token"
  - id: "CRED-018"
    pattern: "ghs_[A-Za-z0-9]{36}"
    severity: critical
    category: credential
    description: "GitHub server-to-server token"
  - id: "CRED-019"
    pattern: "glpat-[A-Za-z0-9_\\-]{20,}"
    severity: critical
    category: credential
    description: "GitLab personal access token"
  - id: "CRED-020"
    pattern: "xoxb-[0-9]+-[A-Za-z0-9]+"
    severity: critical
    category: credential
    description: "Slack bot token"
  - id: "CRED-021"
    pattern: "xoxp-[0-9]+-[A-Za-z0-9]+"
    severity: critical
    category: credential
    description: "Slack user token"
  - id: "CRED-022"
    pattern: "xapp-[0-9]+-[A-Za-z0-9]+"
    severity: critical
    category: credential
    description: "Slack app token"
  - id: "CRED-023"
    pattern: "sk-[A-Za-z0-9]{32,}"
    severity: critical
    category: credential
    description: "OpenAI / Stripe secret key"
  - id: "CRED-024"
    pattern: "sk-ant-[A-Za-z0-9\\-]{32,}"
    severity: critical
    category: credential
    description: "Anthropic API key"
  - id: "CRED-025"
    pattern: "SG\\.[A-Za-z0-9_\\-]{22}\\.[A-Za-z0-9_\\-]{43}"
    severity: critical
    category: credential
    description: "SendGrid API key"
  - id: "CRED-026"
    pattern: "sq0atp-[A-Za-z0-9_\\-]{22}"
    severity: critical
    category: credential
    description: "Square access token"

  # Database connection strings
  - id: "CRED-027"
    pattern: "(?:mysql|postgres|postgresql|mongodb|redis)://[^\\s:]+:[^\\s@]+@"
    severity: critical
    category: credential
    description: "Database connection string with credentials"
  - id: "CRED-028"
    pattern: "mongodb\\+srv://[^\\s:]+:[^\\s@]+@"
    severity: critical
    category: credential
    description: "MongoDB SRV connection string with credentials"

  # JWT tokens
  - id: "CRED-029"
    pattern: "eyJ[A-Za-z0-9_\\-]+\\.eyJ[A-Za-z0-9_\\-]+\\.[A-Za-z0-9_\\-]+"
    severity: warning
    category: credential
    description: "JWT token"

  # SSH passwords
  - id: "CRED-030"
    pattern: "sshpass\\s+-p\\s+\\S+"
    severity: critical
    category: credential
    description: "SSH password in command"

  # Azure
  - id: "CRED-031"
    pattern: "AccountKey=[A-Za-z0-9+/=]{44,}"
    severity: critical
    category: credential
    description: "Azure storage account key"
  - id: "CRED-032"
    pattern: "SharedAccessSignature=[A-Za-z0-9%&=]+"
    severity: critical
    category: credential
    description: "Azure shared access signature"

  # GCP
  - id: "CRED-033"
    pattern: "AIza[A-Za-z0-9_\\-]{35}"
    severity: critical
    category: credential
    description: "Google API key"
  - id: "CRED-034"
    pattern: "\"type\":\\s*\"service_account\""
    severity: warning
    category: credential
    description: "GCP service account JSON"
  - id: "CRED-035"
    pattern: "\"private_key\":\\s*\"-----BEGIN"
    severity: critical
    category: credential
    description: "GCP service account private key"

  # Heroku
  - id: "CRED-036"
    pattern: "heroku_api_key\\s*[=:]\\s*\\S+"
    severity: critical
    category: credential
    description: "Heroku API key"

  # Twilio
  - id: "CRED-037"
    pattern: "SK[a-f0-9]{32}"
    severity: warning
    category: credential
    description: "Twilio API key"

  # Generic secrets
  - id: "CRED-038"
    pattern: "client_secret\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{16,}['\"]"
    severity: critical
    category: credential
    description: "OAuth client secret"
  - id: "CRED-039"
    pattern: "encryption_key\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{16,}['\"]"
    severity: critical
    category: credential
    description: "Encryption key assignment"
  - id: "CRED-040"
    pattern: "signing_key\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{16,}['\"]"
    severity: critical
    category: credential
    description: "Signing key assignment"
  - id: "CRED-041"
    pattern: "npm_[A-Za-z0-9]{36}"
    severity: critical
    category: credential
    description: "npm access token"
  - id: "CRED-042"
    pattern: "pypi-[A-Za-z0-9_\\-]{16,}"
    severity: critical
    category: credential
    description: "PyPI API token"
