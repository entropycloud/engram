changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - docs
        - documentation
    - title: "Maintenance"
      labels:
        - chore
        - refactor
        - ci
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
